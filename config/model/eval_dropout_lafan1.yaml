model_name: "MCDropout"

model_hyperparam:
    layer_num: 8
    dropout_p: 0.1
    hidden_size: 1024
    norm_type: "group_norm"
    use_cond: False
    act_type: "SiLU"

optimizer:
    loss_type: "crps"
    initial_lr: 0.0001
    final_lr: 0.000001
    total_epochs: 60
    mini_batch_size: 4096
    full_T: False
    rollout: 3
    EMA:    
        ema_decay: 0.99
        ema_start: 1000
        ema_update_rate: 1

data:   
    dataset_name: "LAFAN1"
    path: "./data/LAFAN1"
    
    root_rot_offset: -90 #degree
    data_fps: 30
    data_trim_begin: 0
    data_trim_end: -1
    min_motion_len: 0
    max_motion_len: -1
    data_rot_rpr: 6d
    data_component: [position,velocity,angle]

test:
    test_interval: 5
    test_num_steps: 500
    test_num_trials: 3
    test_num_init_frame: 1
    plot_indices: [0, 1, 2, 3, 4]
    crps_step: 5
    max_plot_traj: 1
    plot_every_n_test: 4
    save_checkpoint_every_n_test: 10
    single_test: True
    choose_test_indices: True
    test_indices: [214730, 299650, 326670, 364325, 53670]
