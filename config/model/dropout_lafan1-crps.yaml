model_name: "MCDropout"

model_hyperparam:
    layer_num: 8
    dropout_p: 0.1
    hidden_size: 1024
    norm_type: "group_norm"
    use_cond: False
    act_type: "SiLU"

optimizer:
    loss_type: "crps"
    crps_ens: 2
    crps_rollout_steps: 5
    crps_horizon_weights: null   # or [0.5, 0.5], or [0.3, 0.7]
    initial_lr: 0.0002
    final_lr: 0.00001
    total_epochs: 110
    mini_batch_size: 1024
    full_T: False
    rollout: 6
    EMA:
        ema_decay: 0.99
        ema_start: 1000
        ema_update_rate: 1
    muon_lr: 0.00001
    muon_decay: 0.1
    muon_momentum: 0.95

data:   
    dataset_name: "LAFAN1"
    path: "./data/LAFAN1"
    
    root_rot_offset: -90 #degree
    data_fps: 30
    data_trim_begin: 0
    data_trim_end: -1
    min_motion_len: 0
    max_motion_len: -1
    data_rot_rpr: 6d
    data_component: [position,velocity,angle]

test:
    test_interval: 5
    test_num_steps: 50
    test_num_trials: 10
    test_num_init_frame: 128
    plot_indices: [0, 26, 51, 76, 101, 126]
    crps_step: 5
    max_plot_traj: 3
    plot_every_n_test: 4
    save_checkpoint_every_n_test: 10
    single_test: False
    choose_test_indices: False
    test_indices: []
