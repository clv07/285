model_name: "AMDM_WINDOW"

# wandb_project: "amdm-window-motion"
wandb_project: "rollouts"


diffusion:
    sample_mode: "ddpm"
    estimate_mode: "epsilon"
    loss_type: "l1"
    noise_schedule_mode: "cosine"
    T: 8 #40 #25
    eval_T: 8 #40 #25
    #denoiser: 
    window_size: 5 # use previous 3 frames (if have time do more frames)

model_hyperparam:
    layer_num: 8
    #cond_mask_prob: 0
    #cond_emb_size: 256 #condition frame for [class, text, etc]
    time_emb_size: 64 #time embediing
    hidden_size: 1024
    use_cond: False
    cond_num_cls: 0
    norm_type: "group_norm"
    act_type: "SiLU"

optimizer:
    loss_type: "l1"
    initial_lr: 0.001
    final_lr: 0.000001
    total_epochs: 500
    mini_batch_size: 4096
    full_T: False
    rollout: 6 # always be diffusion.window_size + 1
    EMA:
        ema_decay: 0.99
        ema_start: 1000
        ema_update_rate: 1

data:   
    dataset_name: "LAFAN1"
    path: "./data/LAFAN1"
    
    root_rot_offset: -90 #degree
    data_fps: 30
    data_trim_begin: 0
    data_trim_end: -1
    min_motion_len: 0
    max_motion_len: -1
    data_rot_rpr: 6d
    data_component: [position,velocity,angle]

test:
    test_interval: 5
    test_num_steps: 50
    test_num_trials: 10
    test_num_init_frame: 128
    plot_indices: [0, 25, 50, 75, 100, 125]
    crps_step: 5
    max_plot_traj: 3
    plot_every_n_test: 4
    save_checkpoint_every_n_test: 10
    single_test: False
    choose_test_indices: False
    test_indices: []



